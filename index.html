<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Corcoran Photo Archive</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <header class="topbar">
    <div class="wrap">
      <h1>Corcoran Photo Archive</h1>
      <div class="controls">
        <input id="search" type="search" placeholder="Search keywords, location, artist..." autocomplete="off" />
        <span id="count" class="count"></span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section id="masonry" class="masonry" aria-live="polite"></section>
    <div id="status" class="status"></div>
  </main>

  <!-- Your JS file (host this in your GitHub repo if you want) -->
  <script src="./archive.js"></script>
</body>
</html>
