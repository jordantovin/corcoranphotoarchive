<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Corcoran Photo Archive</title>

  <!-- Custom domain + GitHub Pages: use root-relative paths -->
  <link rel="stylesheet" href="/style.css">
  <script src="/script.js" defer></script>
</head>

<body>
  <header class="topbar">
    <div class="wrap">
      <h1>Corcoran Photo Archive</h1>
      <div class="controls">
        <input id="search" type="search" placeholder="Search keywords, location, artist..." autocomplete="off" />
        <span id="count" class="count"></span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section id="masonry" class="masonry" aria-live="polite"></section>
    <div id="status" class="status"></div>
  </main>
  <div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <img id="modal-img" />
    <div id="modal-meta" class="modal-meta"></div>
  </div>
</div>
</body>
</html>
