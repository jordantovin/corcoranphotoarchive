<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Corcoran Photo Archive</title>

  <link rel="stylesheet" href="/style.css?v=1">
  <script src="/script.js?v=1" defer></script>
</head>

<body>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <h1>Corcoran Photo Archive</h1>

      <div class="controls">
        <input
          id="search"
          type="search"
          placeholder="Search keywords, location, artist..."
          autocomplete="off"
        />
        <span id="count" class="count"></span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section id="masonry" class="masonry" aria-live="polite"></section>
    <div id="status" class="status"></div>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal" aria-hidden="true">
    <button id="modal-close" class="modal-close" aria-label="Close">×</button>

    <div class="modal-shell" role="dialog" aria-modal="true" aria-label="Image details">
      <img id="modal-img" alt="" />
      <div id="modal-meta" class="modal-meta"></div>
    </div>
  </div>
</body>
</html>
